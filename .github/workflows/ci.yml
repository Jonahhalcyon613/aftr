name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # The signing tool (zxp-sign-cmd) downloads a binary on postinstall that
      # isn't needed for the headless test suite — skip install scripts in CI.
      - name: Install
        run: npm ci --ignore-scripts

      - name: Build JSX bundle
        run: npm run build:jsx

      - name: Unit + simulator tests (no After Effects required)
        run: npm test

      - name: End-to-end (controller + simulator round-trip)
        run: npm run e2e
